name: Unzip Bot Files
on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract and Move Bot Files
        run: |
          # যদি জিপ ফাইলটি ফোল্ডারের ভেতর থাকে তবে বাইরে আনা
          if [ -f ".github/BELAL-BOTX666-MAX-main.zip" ]; then
            mv .github/BELAL-BOTX666-MAX-main.zip ./
          fi
          
          # জিপ ফাইল আনজিপ করা
          if [ -f "BELAL-BOTX666-MAX-main.zip" ]; then
            unzip -o BELAL-BOTX666-MAX-main.zip
          fi
          
          # শুধুমাত্র বটের দরকারি ফাইলগুলো বাইরে আনা (.github বাদে)
          if [ -d "BELAL-BOTX666-MAX-main" ]; then
            find BELAL-BOTX666-MAX-main -maxdepth 1 -not -name "BELAL-BOTX666-MAX-main" -not -name ".github" -exec mv -t ./ {} +
            rm -rf BELAL-BOTX666-MAX-main
          fi
          
          # পুরোনো জিপ ফাইল ডিলিট করা
          rm -f BELAL-BOTX666-MAX-main.zip

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Moved bot files to root without touching workflows"
          git push
          
